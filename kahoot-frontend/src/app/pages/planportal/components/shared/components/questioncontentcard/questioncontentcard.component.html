<div class="flex w-full justify-center px-6 pt-6">
  <div class="w-full max-w-2xl rounded-xl border border-border bg-card p-4 shadow-sm">
    <textarea
      class="w-full resize-none bg-transparent text-center text-xl font-semibold placeholder:text-muted-foreground focus:outline-none"
      rows="3"
      placeholder="Type your question here…"
      [value]="question().name"
      (input)="onNameChange($any($event.target).value)"
    ></textarea>
  </div>
</div>
