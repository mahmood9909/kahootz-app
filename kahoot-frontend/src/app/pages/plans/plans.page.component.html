<div class="mx-auto max-w-4xl px-6 py-10">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">My Plans</h1>
      <p class="mt-1 text-sm text-muted-foreground">Manage and create your plans.</p>
    </div>
    <a [routerLink]="['/plan', 'new']" hlmBtn size="sm" class="gap-1.5">
      <ng-icon name="lucidePlus" class="size-4" />
      New Plan
    </a>
  </div>

  <!-- Plan grid -->
  <div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (plan of plans; track plan.id) {
      <div hlmCard class="flex flex-col justify-between gap-4 p-5">
        <div>
          <div class="flex items-start justify-between gap-2">
            <h2 class="text-sm font-semibold leading-tight">{{ plan.title }}</h2>
            <span hlmBadge variant="secondary" class="shrink-0">
              {{ plan.questionCount }} Qs
            </span>
          </div>
          <p class="mt-1.5 text-xs text-muted-foreground">Updated {{ plan.updatedAt }}</p>
        </div>
        <div class="flex items-center gap-2">
          <a [routerLink]="['/plan', plan.id]" hlmBtn variant="outline" size="sm" class="flex-1 gap-1.5">
            <ng-icon name="lucidePencil" class="size-3.5" />
            Edit
          </a>
          <button hlmBtn variant="ghost" size="icon" class="size-8 text-destructive hover:text-destructive">
            <ng-icon name="lucideTrash2" class="size-4" />
          </button>
        </div>
      </div>
    }
  </div>

  @if (plans.length === 0) {
    <div class="mt-20 flex flex-col items-center gap-3 text-center">
      <p class="text-sm text-muted-foreground">No plans yet.</p>
      <a [routerLink]="['/plan', 'new']" hlmBtn size="sm" class="gap-1.5">
        <ng-icon name="lucidePlus" class="size-4" />
        Create your first plan
      </a>
    </div>
  }

</div>
