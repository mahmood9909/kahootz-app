<div class="fixed top-4 right-4">
  <button hlmBtn variant="outline" size="icon" (click)="themeService.toggle()" aria-label="Toggle theme">
    @if (themeService.isDark()) {
      <ng-icon name="lucideSun" />
    } @else {
      <ng-icon name="lucideMoon" />
    }
  </button>
</div>
