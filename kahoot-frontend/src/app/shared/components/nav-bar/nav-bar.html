<nav class="fixed top-0 inset-x-0 z-50 flex h-16 items-center gap-6 border-b border-border/50 bg-background/80 px-6 backdrop-blur-md">

  <!-- Logo -->
  <a routerLink="/" class="flex shrink-0 items-center gap-2">
    @if (theme.isDark()) {
      <img src="assets/logo-dark.svg" [alt]="appName" class="size-8" aria-hidden="true" />
    } @else {
      <img src="assets/logo-light.svg" [alt]="appName" class="size-8" aria-hidden="true" />
    }
    <span class="text-base font-bold tracking-tight">{{ appName }}</span>
  </a>

  <!-- Nav items -->
  <ul class="flex flex-1 items-center gap-1">
    @for (item of navItems; track item.path) {
      <li>
        <a
          [routerLink]="item.path"
          routerLinkActive="text-foreground font-semibold"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          class="rounded-md px-3 py-1.5 text-sm text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
        >
          {{ item.name }}
        </a>
      </li>
    }
  </ul>

  <!-- Right cluster: theme toggle + auth avatar -->
  <div class="flex items-center gap-1">

    <!-- Theme toggle -->
    <button hlmBtn variant="ghost" size="icon" (click)="theme.toggle()" aria-label="Toggle theme">
      @if (theme.isDark()) {
        <ng-icon name="lucideSun" class="size-5" />
      } @else {
        <ng-icon name="lucideMoon" class="size-5" />
      }
    </button>

    <!-- Auth avatar -->
    @if (auth.isLoggedIn()) {
      <button hlmBtn variant="ghost" size="icon" [hlmDropdownMenuTrigger]="userMenu" align="end" aria-label="User menu">
        <ng-icon name="lucideUser" class="size-5" />
      </button>

      <ng-template #userMenu>
        <hlm-dropdown-menu class="w-48">
          <hlm-dropdown-menu-group>
            <button hlmDropdownMenuItem routerLink="/dashboard">
              <ng-icon name="lucideLayoutDashboard" class="size-4" />
              <span>Dashboard</span>
            </button>
          </hlm-dropdown-menu-group>
          <hlm-dropdown-menu-separator />
          <hlm-dropdown-menu-group>
            <button hlmDropdownMenuItem>
              <ng-icon name="lucideUser" class="size-4" />
              <span>Profile</span>
            </button>
            <button hlmDropdownMenuItem>
              <ng-icon name="lucideSettings" class="size-4" />
              <span>Settings</span>
            </button>
          </hlm-dropdown-menu-group>
          <hlm-dropdown-menu-separator />
          <button hlmDropdownMenuItem>
            <ng-icon name="lucideLogOut" class="size-4" />
            <span>Log Out</span>
          </button>
        </hlm-dropdown-menu>
      </ng-template>
    } @else {
      <button hlmBtn variant="ghost" size="icon" [hlmDropdownMenuTrigger]="authMenu" align="end" aria-label="Sign in or sign up">
        <ng-icon name="lucideUser" class="size-5" />
      </button>

      <ng-template #authMenu>
        <hlm-dropdown-menu class="w-40">
          <hlm-dropdown-menu-group>
            <button hlmDropdownMenuItem routerLink="/signin">
              <ng-icon name="lucideLogIn" class="size-4" />
              <span>Sign In</span>
            </button>
            <hlm-dropdown-menu-separator />
            <button hlmDropdownMenuItem routerLink="/signup">
              <ng-icon name="lucideUserPlus" class="size-4" />
              <span>Sign Up</span>
            </button>
          </hlm-dropdown-menu-group>
        </hlm-dropdown-menu>
      </ng-template>
    }

  </div>
</nav>
